<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="家庭相册">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>家庭相册</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --bg2: #13131a; --bg3: #1e1e2a;
      --accent: #e8c97a; --accent2: #c4953a;
      --text: #f0ede8; --text2: #9994a0;
      --radius: 12px; --safe-top: env(safe-area-inset-top,0px);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system,'PingFang SC','Hiragino Sans GB',sans-serif; overflow: hidden; }

    #app { display: flex; flex-direction: column; height: 100dvh; }

    /* ── 顶栏 */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: calc(var(--safe-top) + 14px) 20px 10px;
      background: linear-gradient(180deg,rgba(10,10,15,.98) 0%,rgba(10,10,15,0) 100%);
      position: relative; z-index: 10;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 700; }
    .logo span { color: var(--accent); }
    .header-right { display: flex; gap: 8px; align-items: center; }
    .btn-icon { width: 38px; height: 38px; border-radius: 50%; background: var(--bg3);
      border: none; color: var(--text); font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: filter .2s; }
    .btn-icon:hover { filter: brightness(1.3); }

    /* ── 自动备份状态条 */
    #backup-bar {
      margin: 0 16px 8px; padding: 8px 14px; border-radius: 8px;
      background: var(--bg2); font-size: 12px; color: var(--text2);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    #backup-bar.active { background: rgba(232,201,122,.12); color: var(--accent); }
    #backup-bar.done   { background: rgba(80,200,120,.12); color: #5c8; }
    #backup-bar.hidden { display: none; }
    .backup-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor;
      flex-shrink: 0; }
    .backup-dot.pulse { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes slideUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
    #backup-bar.done { background: rgba(80,200,120,.12); color: #5c8; }
    .btn-sm { padding: 4px 12px; border-radius: 12px; border: 1px solid currentColor;
      background: none; color: inherit; font-size: 12px; cursor: pointer; }

    /* ── Tab 栏 */
    #tabs { display: flex; gap: 4px; padding: 0 16px 10px; overflow-x: auto; }
    #tabs::-webkit-scrollbar { display: none; }
    .tab { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
      white-space: nowrap; cursor: pointer; border: none;
      background: var(--bg3); color: var(--text2); transition: all .2s; }
    .tab.active { background: var(--accent); color: #0a0a0f; }

    /* ── 主内容 */
    main { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 12px 90px; }
    main::-webkit-scrollbar { width: 4px; }
    main::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

    /* ── 时间线 */
    .month-group { margin-bottom: 28px; }
    .month-header { display: flex; align-items: baseline; gap: 8px;
      padding: 8px 4px 10px; position: sticky; top: 0;
      background: linear-gradient(180deg,var(--bg) 70%,transparent); z-index: 5; }
    .month-label { font-size: 20px; font-weight: 700; }
    .month-count { font-size: 12px; color: var(--text2); }

    /* ── 分类卡片（地点/标签） */
    .category-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(150px,1fr)); gap: 10px; padding: 4px; }
    @media(min-width:600px){ .category-grid { grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); } }
    .cat-card { border-radius: 10px; overflow: hidden; cursor: pointer;
      background: var(--bg3); position: relative; aspect-ratio: 4/3;
      transition: transform .2s; }
    .cat-card:hover { transform: scale(1.03); }
    .cat-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cat-card .cat-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(0deg,rgba(0,0,0,.7) 0%,transparent 50%);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 10px 12px;
    }
    .cat-name { font-size: 15px; font-weight: 700; }
    .cat-count { font-size: 12px; color: rgba(255,255,255,.65); }
    .cat-card.empty { background: var(--bg3); display: flex; align-items: center;
      justify-content: center; font-size: 13px; color: var(--text2); aspect-ratio: auto; padding: 20px; }

    /* ── 网格 */
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(140px,1fr)); gap: 3px; }
    @media(min-width:600px){ .media-grid { grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); } }
    @media(min-width:1200px){ .media-grid { grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); } }
    .media-item { position: relative; aspect-ratio: 1; overflow: hidden;
      border-radius: 5px; cursor: pointer; background: var(--bg3);
      transition: transform .2s, box-shadow .2s; }
    .media-item:hover { transform: scale(1.02); box-shadow: 0 8px 24px rgba(0,0,0,.5); z-index:2; }
    .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .video-badge { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,.7);
      color: #fff; border-radius: 4px; padding: 1px 5px; font-size: 10px; }
    .play-icon { position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; font-size: 32px; color: rgba(255,255,255,.85);
      text-shadow: 0 2px 8px rgba(0,0,0,.8); }
    .region-badge { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,.6);
      color: #fff; border-radius: 4px; padding: 1px 6px; font-size: 10px; }

    /* ── 空状态 */
    #empty { display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 55vh; gap: 14px; color: var(--text2); }
    #empty .empty-icon { font-size: 56px; opacity: .4; }
    #empty h2 { font-size: 18px; color: var(--text); }
    #empty p { font-size: 13px; text-align: center; line-height: 1.6; }
    .btn-primary { padding: 11px 26px; background: var(--accent); color: #0a0a0f;
      border: none; border-radius: 22px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: filter .2s; }
    .btn-primary:hover { filter: brightness(1.1); }

    /* ── 底导航 */
    nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex;
      background: rgba(13,13,20,.95); backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,.06);
      padding-bottom: env(safe-area-inset-bottom,0px); z-index: 20; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 9px 0 7px; font-size: 10px; color: var(--text2);
      cursor: pointer; border: none; background: none; transition: color .2s; }
    .nav-icon { font-size: 21px; transition: transform .2s; }
    .nav-item.active { color: var(--accent); }
    .nav-item.active .nav-icon { transform: scale(1.1); }

    /* ── 灯箱 */
    #lightbox { position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.96); display: none; flex-direction: column; }
    #lightbox.open { display: flex; }
    #lb-header { display: flex; align-items: center; justify-content: space-between;
      padding: calc(var(--safe-top)+10px) 14px 10px; }
    #lb-title { font-size: 13px; color: var(--text2); }
    #lb-close { font-size: 26px; background: none; border: none; color: var(--text);
      cursor: pointer; padding: 4px 8px; }
    #lb-body { flex: 1; display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative; }
    #lb-body img, #lb-body video { max-width: 100%; max-height: 100%; object-fit: contain; }
    #lb-prev, #lb-next { position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.12); border: none; color: #fff; font-size: 26px;
      padding: 14px 10px; cursor: pointer; border-radius: 6px; transition: background .2s; }
    #lb-prev { left: 6px; } #lb-next { right: 6px; }
    #lb-prev:hover, #lb-next:hover { background: rgba(255,255,255,.22); }
    #lb-footer { padding: 10px 14px calc(env(safe-area-inset-bottom,0px)+10px);
      display: flex; justify-content: space-between; align-items: center; }
    #lb-info { font-size: 11px; color: var(--text2); }
    .lb-actions { display: flex; gap: 10px; }
    .lb-btn { padding: 7px 16px; border-radius: 18px; border: 1px solid rgba(255,255,255,.2);
      background: none; color: var(--text); font-size: 13px; cursor: pointer; transition: background .2s; }
    .lb-btn:hover { background: rgba(255,255,255,.1); }
    .lb-btn.danger { border-color: #e05; color: #e05; }

    /* ── 上传面板 */
    #upload-panel { position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,.82); display: none; align-items: flex-end; }
    #upload-panel.open { display: flex; }
    #upload-sheet { width: 100%; background: var(--bg2); border-radius: 20px 20px 0 0;
      padding: 22px 20px calc(env(safe-area-inset-bottom,0px)+22px);
      animation: slideUp .3s ease; }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    #upload-sheet h3 { font-size: 17px; margin-bottom: 16px; }
    #drop-zone { border: 2px dashed rgba(232,201,122,.4); border-radius: var(--radius);
      padding: 36px 20px; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s; position: relative; }
    #drop-zone:hover, #drop-zone.dragover { border-color: var(--accent); background: rgba(232,201,122,.05); }
    #drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .drop-icon { font-size: 44px; margin-bottom: 10px; }
    .drop-text { font-size: 14px; color: var(--text2); line-height: 1.6; }
    #upload-progress { margin-top: 14px; display: none; }
    .progress-bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
    #upload-status { font-size: 12px; color: var(--text2); }

    /* ── 骨架屏 */
    .skeleton { background: linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
      border-radius: 5px; aspect-ratio: 1; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── 统计条 */
    #stats-bar { display: flex; gap: 16px; padding: 0 20px 8px; font-size: 12px; color: var(--text2); }
    #stats-bar strong { color: var(--accent); }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">🎞 家庭<span>相册</span></div>
    <div class="header-right">
      <button class="btn-icon" id="backup-btn" title="备份照片" onclick="openBackupPanel()">☁</button>
      <button class="btn-icon" onclick="openUpload()" title="上传">＋</button>
    </div>
  </header>

  <!-- 备份状态条 -->
  <div id="backup-bar" class="hidden">
    <div style="display:flex;align-items:center;gap:8px;flex:1">
      <div class="backup-dot" id="backup-dot"></div>
      <span id="backup-text">上次备份：未备份</span>
    </div>
    <button class="btn-sm" onclick="openBackupPanel()">备份</button>
  </div>

  <!-- 备份面板弹窗 -->
  <div id="backup-panel" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);align-items:flex-end;justify-content:center;" onclick="if(event.target===this)closeBackupPanel()">
    <div style="background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:24px 24px 40px;animation:slideUp .3s ease">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <span style="font-size:17px;font-weight:700">备份照片到本设备</span>
        <button onclick="closeBackupPanel()" style="background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer">×</button>
      </div>

      <!-- 说明区 -->
      <div style="background:rgba(232,201,122,.08);border:1px solid rgba(232,201,122,.2);border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:var(--text2);line-height:1.7">
        💡 <strong style="color:var(--accent)">如何使用：</strong><br>
        点击下方按钮选择手机相册（或整个 DCIM 文件夹），程序会自动跳过已备份的照片，只上传新增的。<br>
        <span style="color:rgba(255,255,255,.4);font-size:12px">注：受浏览器限制，首次需手动选择；安卓可选整个文件夹实现批量备份。</span>
      </div>

      <!-- 进度条区域 -->
      <div id="bp-progress" style="display:none;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
          <span id="bp-status-text" style="color:var(--accent)">准备中...</span>
          <span id="bp-count-text" style="color:var(--text2)"></span>
        </div>
        <div style="height:4px;background:var(--bg3);border-radius:4px;overflow:hidden">
          <div id="bp-bar" style="height:100%;width:0%;background:var(--accent);transition:width .3s;border-radius:4px"></div>
        </div>
      </div>

      <!-- 操作按钮 -->
      <div style="display:flex;flex-direction:column;gap:10px">
        <button onclick="backupSelectFiles()" style="padding:14px;border-radius:12px;background:var(--accent);color:#0a0a0f;border:none;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
          📷 选择照片 / 视频
        </button>
        <button id="bp-folder-btn" onclick="backupSelectFolder()" style="padding:14px;border-radius:12px;background:var(--bg3);color:var(--text);border:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
          📁 选择整个相册文件夹 <span style="font-size:11px;color:var(--text2);margin-left:4px">（安卓推荐）</span>
        </button>
      </div>

      <!-- 上次备份信息 -->
      <div id="bp-last-info" style="margin-top:16px;text-align:center;font-size:12px;color:var(--text2)"></div>
    </div>
  </div>

  <div id="stats-bar">
    <span>共 <strong id="stat-total">0</strong> 个</span>
    <span>📷 <strong id="stat-img">0</strong></span>
    <span>🎬 <strong id="stat-vid">0</strong></span>
  </div>

  <!-- Tab -->
  <div id="tabs">
    <button class="tab active" onclick="switchTab('timeline',this)">时间线</button>
    <button class="tab" onclick="switchTab('tags',this)">分类</button>
    <button class="tab" onclick="switchTab('regions',this)">地点</button>
    <button class="tab" onclick="switchTab('videos',this)">视频</button>
  </div>

  <main id="main-scroll">
    <div id="tab-timeline"></div>
    <div id="tab-tags"    style="display:none"></div>
    <div id="tab-regions" style="display:none"></div>
    <div id="tab-videos"  style="display:none"></div>
    <div id="empty" style="display:none">
      <div class="empty-icon">📷</div>
      <h2>还没有照片</h2>
      <p>点击右上角 ＋ 上传家庭照片和视频<br>或开启自动备份</p>
      <button class="btn-primary" onclick="openUpload()">立即上传</button>
    </div>
  </main>

  <nav>
    <button class="nav-item active" onclick="switchTab('timeline',null,this)">
      <span class="nav-icon">🏠</span>时间线
    </button>
    <button class="nav-item" onclick="openUpload()">
      <span class="nav-icon">＋</span>上传
    </button>
    <button class="nav-item" onclick="switchTab('tags',null,this)">
      <span class="nav-icon">⊞</span>分类
    </button>
    <button class="nav-item" onclick="switchTab('regions',null,this)">
      <span class="nav-icon">📍</span>地点
    </button>
  </nav>
</div>

<!-- 灯箱 -->
<div id="lightbox">
  <div id="lb-header">
    <span id="lb-title"></span>
    <button id="lb-close" onclick="closeLightbox()">✕</button>
  </div>
  <div id="lb-body">
    <button id="lb-prev" onclick="lbNav(-1)">‹</button>
    <div id="lb-content"></div>
    <button id="lb-next" onclick="lbNav(1)">›</button>
  </div>
  <div id="lb-footer">
    <div id="lb-info"></div>
    <div class="lb-actions">
      <button class="lb-btn" onclick="downloadCurrent()">⬇ 下载</button>
      <button class="lb-btn danger" onclick="deleteCurrent()">🗑 删除</button>
    </div>
  </div>
</div>

<!-- 上传面板 -->
<div id="upload-panel" onclick="closeUpload(event)">
  <div id="upload-sheet">
    <h3>上传照片 / 视频</h3>
    <div id="drop-zone">
      <input type="file" id="file-input" multiple
             accept="image/*,video/*,.heic,.heif"
             onchange="handleFiles(this.files)">
      <div class="drop-icon">📁</div>
      <div class="drop-text">
        点击选择文件，或拖拽到此处<br>
        <small>支持 JPG PNG HEIC MP4 MOV，自动去重</small>
      </div>
    </div>
    <div id="upload-progress">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div id="upload-status">准备上传...</div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// 状态
// ══════════════════════════════════════════════
let lbItems = [], lbIndex = 0;
let currentTab = 'timeline';

// ══════════════════════════════════════════════
// 初始化
// ══════════════════════════════════════════════
async function init() {
  await Promise.all([loadStats(), loadCurrentTab()]);
  initBackupState();
}

async function loadStats() {
  try {
    const s = await fetch('/api/stats').then(r => r.json());
    document.getElementById('stat-total').textContent = s.total || 0;
    document.getElementById('stat-img').textContent   = s.images || 0;
    document.getElementById('stat-vid').textContent   = s.videos || 0;
  } catch (_) {}
}

// ══════════════════════════════════════════════
// Tab 切换
// ══════════════════════════════════════════════
function switchTab(tab, tabEl, navEl) {
  currentTab = tab;

  // tab 按钮高亮
  if (tabEl) {
    document.querySelectorAll('#tabs .tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
  }
  // 底导航高亮
  if (navEl) {
    document.querySelectorAll('nav .nav-item').forEach(n => n.classList.remove('active'));
    navEl.classList.add('active');
  }

  ['timeline','tags','regions','videos'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  loadCurrentTab();
}

function loadCurrentTab() {
  if (currentTab === 'timeline') return loadTimeline();
  if (currentTab === 'tags')     return loadTags();
  if (currentTab === 'regions')  return loadRegions();
  if (currentTab === 'videos')   return loadVideos();
}

// ══════════════════════════════════════════════
// 时间线
// ══════════════════════════════════════════════
async function loadTimeline() {
  const tl = document.getElementById('tab-timeline');
  tl.innerHTML = '';
  try {
    const groups = await fetch('/api/timeline').then(r => r.json());
    if (!groups.length) { document.getElementById('empty').style.display = 'flex'; return; }
    document.getElementById('empty').style.display = 'none';
    for (const g of groups) {
      const sec = document.createElement('div');
      sec.className = 'month-group';
      sec.innerHTML = `
        <div class="month-header">
          <div class="month-label">${g.label}</div>
          <div class="month-count">${g.count} 个</div>
        </div>
        <div class="media-grid" id="grid-${g.year}-${g.month}">
          ${Array(Math.min(g.count,8)).fill('<div class="skeleton"></div>').join('')}
        </div>`;
      tl.appendChild(sec);
      loadMonthMedia(g.year, g.month);
    }
  } catch (_) {
    tl.innerHTML = '<p style="color:#e05;padding:20px">加载失败</p>';
  }
}

async function loadMonthMedia(year, month) {
  const grid = document.getElementById(`grid-${year}-${month}`);
  if (!grid) return;
  const data = await fetch(`/api/media?year=${year}&month=${month}&limit=200`).then(r => r.json());
  grid.innerHTML = '';
  renderMediaItems(grid, data.items);
}

// ══════════════════════════════════════════════
// 分类（标签）
// ══════════════════════════════════════════════
async function loadTags() {
  const el = document.getElementById('tab-tags');
  el.innerHTML = '<div style="padding:16px 4px;font-size:13px;color:var(--text2)">按规则自动分类</div>';
  try {
    const tags = await fetch('/api/tags').then(r => r.json());
    if (!tags.length) { el.innerHTML += '<p style="color:var(--text2);padding:20px">上传照片后自动生成分类</p>'; return; }
    const grid = document.createElement('div');
    grid.className = 'category-grid';
    for (const t of tags) {
      const card = document.createElement('div');
      card.className = 'cat-card';
      card.innerHTML = `
        <img src="/media/thumbs/${t.cover}.jpg" onerror="this.style.display='none'" loading="lazy">
        <div class="cat-overlay">
          <div class="cat-name">${t.tag}</div>
          <div class="cat-count">${t.count} 个</div>
        </div>`;
      card.onclick = () => openTagView(t.tag);
      grid.appendChild(card);
    }
    el.appendChild(grid);
  } catch (_) {}
}

async function openTagView(tag) {
  const el = document.getElementById('tab-tags');
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;padding:12px 4px 16px">
      <button onclick="loadTags()" style="background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer">← 返回</button>
      <span style="font-size:16px;font-weight:700">${tag}</span>
    </div>
    <div class="media-grid" id="tag-grid"></div>`;
  const data = await fetch(`/api/media?tag=${encodeURIComponent(tag)}&limit=500`).then(r => r.json());
  renderMediaItems(document.getElementById('tag-grid'), data.items);
}

// ══════════════════════════════════════════════
// 地点
// ══════════════════════════════════════════════
async function loadRegions() {
  const el = document.getElementById('tab-regions');
  el.innerHTML = '<div style="padding:16px 4px;font-size:13px;color:var(--text2)">按 EXIF GPS 自动识别地点</div>';
  try {
    const regions = await fetch('/api/regions').then(r => r.json());
    if (!regions.length) {
      el.innerHTML += '<p style="color:var(--text2);padding:20px">上传含 GPS 信息的照片后自动显示地点</p>';
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'category-grid';
    for (const r of regions) {
      const card = document.createElement('div');
      card.className = 'cat-card';
      card.innerHTML = `
        <img src="/media/thumbs/${r.cover}.jpg" onerror="this.style.display='none'" loading="lazy">
        <div class="cat-overlay">
          <div class="cat-name">📍 ${r.region}</div>
          <div class="cat-count">${r.count} 张</div>
        </div>`;
      card.onclick = () => openRegionView(r.region);
      grid.appendChild(card);
    }
    el.appendChild(grid);
  } catch (_) {}
}

async function openRegionView(region) {
  const el = document.getElementById('tab-regions');
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;padding:12px 4px 16px">
      <button onclick="loadRegions()" style="background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer">← 返回</button>
      <span style="font-size:16px;font-weight:700">📍 ${region}</span>
    </div>
    <div class="media-grid" id="region-grid"></div>`;
  const data = await fetch(`/api/media?region=${encodeURIComponent(region)}&limit=500`).then(r => r.json());
  renderMediaItems(document.getElementById('region-grid'), data.items);
}

// ══════════════════════════════════════════════
// 视频
// ══════════════════════════════════════════════
async function loadVideos() {
  const el = document.getElementById('tab-videos');
  el.innerHTML = '';
  const data = await fetch('/api/media?type=video&limit=500').then(r => r.json());
  if (!data.items.length) {
    el.innerHTML = '<p style="color:var(--text2);padding:40px 20px;text-align:center">暂无视频</p>';
    return;
  }
  const header = document.createElement('div');
  header.style.cssText = 'padding:12px 4px 14px;font-size:13px;color:var(--text2)';
  header.textContent = `共 ${data.total} 个视频`;
  el.appendChild(header);
  const grid = document.createElement('div');
  grid.className = 'media-grid';
  el.appendChild(grid);
  renderMediaItems(grid, data.items);
}

// ══════════════════════════════════════════════
// 渲染媒体项
// ══════════════════════════════════════════════
function renderMediaItems(container, items) {
  container.innerHTML = '';
  items.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'media-item';
    if (item.type === 'video') {
      div.innerHTML = `
        <video src="${item.url}#t=0.5" preload="metadata"></video>
        <div class="play-icon">▶</div>
        <div class="video-badge">视频</div>`;
    } else {
      div.innerHTML = `<img src="${item.thumb || item.url}" loading="lazy" alt="">`;
    }
    if (item.region) {
      div.innerHTML += `<div class="region-badge">${item.region}</div>`;
    }
    div.addEventListener('click', () => openLightbox(items, i));
    container.appendChild(div);
  });
}

// ══════════════════════════════════════════════
// 灯箱
// ══════════════════════════════════════════════
function openLightbox(items, index) {
  lbItems = items; lbIndex = index;
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
}
function renderLightbox() {
  const item = lbItems[lbIndex];
  document.getElementById('lb-title').textContent =
    `${lbIndex + 1} / ${lbItems.length}`;
  const infoArr = [item.takenAt];
  if (item.region) infoArr.push('📍 ' + item.region);
  if (item.tags?.length) infoArr.push(item.tags.slice(0,3).join(' · '));
  document.getElementById('lb-info').textContent = infoArr.join('  ');

  const content = document.getElementById('lb-content');
  if (item.type === 'video') {
    content.innerHTML = `<video src="${item.url}" controls autoplay
      style="max-width:calc(100vw - 80px);max-height:calc(100dvh - 150px)"></video>`;
  } else {
    content.innerHTML = `<img src="${item.url}"
      style="max-width:calc(100vw - 80px);max-height:calc(100dvh - 150px)" alt="">`;
  }
  document.getElementById('lb-prev').style.display = lbIndex > 0 ? '' : 'none';
  document.getElementById('lb-next').style.display = lbIndex < lbItems.length - 1 ? '' : 'none';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-content').innerHTML = '';
}
function lbNav(dir) {
  lbIndex = Math.max(0, Math.min(lbItems.length - 1, lbIndex + dir));
  renderLightbox();
}
function downloadCurrent() {
  const item = lbItems[lbIndex];
  const a = document.createElement('a');
  a.href = item.url; a.download = item.original; a.click();
}
async function deleteCurrent() {
  if (!confirm('确定删除？')) return;
  await fetch(`/api/media/${lbItems[lbIndex].id}`, { method: 'DELETE' });
  closeLightbox(); init();
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'Escape') closeLightbox();
});

// ══════════════════════════════════════════════
// 上传
// ══════════════════════════════════════════════
function openUpload() { document.getElementById('upload-panel').classList.add('open'); }
function closeUpload(e) {
  if (e.target === document.getElementById('upload-panel'))
    document.getElementById('upload-panel').classList.remove('open');
}
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

async function handleFiles(files) {
  if (!files.length) return;
  const prog = document.getElementById('upload-progress');
  const fill = document.getElementById('progress-fill');
  const status = document.getElementById('upload-status');
  prog.style.display = 'block';

  // 先检查哪些已存在（去重）
  const fileArr = Array.from(files);
  let toUpload = fileArr;
  try {
    const checkRes = await fetch('/api/check-exists', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: fileArr.map(f => ({ name: f.name, size: f.size })) })
    }).then(r => r.json());
    const existSet = new Set(checkRes.exists || []);
    const skipped = fileArr.filter(f => existSet.has(f.name)).length;
    toUpload = fileArr.filter(f => !existSet.has(f.name));
    if (skipped > 0) status.textContent = `跳过 ${skipped} 个已有文件...`;
  } catch (_) {}

  if (!toUpload.length) {
    status.textContent = '✅ 所有文件已存在，无需上传';
    fill.style.width = '100%';
    setTimeout(() => {
      document.getElementById('upload-panel').classList.remove('open');
      prog.style.display = 'none'; fill.style.width = '0%';
    }, 1500);
    return;
  }

  const BATCH = 10;
  let done = 0;
  for (let i = 0; i < toUpload.length; i += BATCH) {
    const batch = toUpload.slice(i, i + BATCH);
    const fd = new FormData();
    batch.forEach(f => fd.append('files', f));
    try {
      await fetch('/api/upload', { method: 'POST', body: fd });
      done += batch.length;
      fill.style.width = Math.round(done / toUpload.length * 100) + '%';
      status.textContent = `已上传 ${done} / ${toUpload.length} 个...`;
    } catch (_) { status.textContent = '上传出错，请重试'; }
  }

  status.textContent = `✅ 上传完成！共 ${done} 个`;
  setTimeout(() => {
    document.getElementById('upload-panel').classList.remove('open');
    prog.style.display = 'none'; fill.style.width = '0%';
    init();
  }, 1500);
}

// ══════════════════════════════════════════════
// 自动备份（手机端 PWA）
// ══════════════════════════════════════════════
// 原理：使用 <input type=file capture> 不现实做真正后台备份
// ══════════════════════════════════════════════
// 备份面板
// ══════════════════════════════════════════════
const BACKUP_KEY = 'family_album_backup';
let backupRunning = false;

function getBackupState() {
  try { return JSON.parse(localStorage.getItem(BACKUP_KEY) || '{}'); }
  catch (_) { return {}; }
}
function saveBackupState(s) { localStorage.setItem(BACKUP_KEY, JSON.stringify(s)); }

function openBackupPanel() {
  const panel = document.getElementById('backup-panel');
  panel.style.display = 'flex';
  // 更新上次备份信息
  const state = getBackupState();
  const info = document.getElementById('bp-last-info');
  if (state.lastBackup) {
    const d = new Date(state.lastBackup);
    info.textContent = `上次备份：${d.toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })}  累计 ${state.uploadedCount || 0} 个文件`;
  } else {
    info.textContent = '尚未备份过';
  }
  // 检测浏览器是否支持文件夹选择
  const testInput = document.createElement('input');
  testInput.type = 'file';
  const supportsDir = 'webkitdirectory' in testInput;
  document.getElementById('bp-folder-btn').style.display = supportsDir ? '' : 'none';
}

function closeBackupPanel() {
  if (backupRunning) return; // 备份中不允许关闭
  document.getElementById('backup-panel').style.display = 'none';
  document.getElementById('bp-progress').style.display = 'none';
}

// 选择单个/多个文件
function backupSelectFiles() {
  if (backupRunning) return;
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = 'image/*,video/*';
  input.onchange = () => input.files.length && startBackup(input.files);
  input.click();
}

// 选择整个文件夹（安卓 Chrome / 桌面 Chrome 支持）
function backupSelectFolder() {
  if (backupRunning) return;
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.webkitdirectory = true;
  // 只保留图片和视频
  input.onchange = () => {
    const allowed = Array.from(input.files).filter(f => /\.(jpe?g|png|gif|webp|heic|heif|mp4|mov|avi|mkv|3gp)$/i.test(f.name));
    if (allowed.length) startBackup(allowed);
  };
  input.click();
}

async function startBackup(filesOrArr) {
  backupRunning = true;
  const fileArr = Array.from(filesOrArr);
  const progress = document.getElementById('bp-progress');
  const statusText = document.getElementById('bp-status-text');
  const countText = document.getElementById('bp-count-text');
  const bar = document.getElementById('bp-bar');
  progress.style.display = 'block';
  bar.style.width = '0%';
  statusText.textContent = `检测 ${fileArr.length} 个文件...`;
  countText.textContent = '';

  // 去重检查
  let toUpload = fileArr;
  try {
    const res = await fetch('/api/check-exists', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: fileArr.map(f => ({ name: f.name, size: f.size })) })
    }).then(r => r.json());
    const existSet = new Set(res.exists || []);
    toUpload = fileArr.filter(f => !existSet.has(f.name));
    const skipped = fileArr.length - toUpload.length;
    if (!toUpload.length) {
      statusText.textContent = '✅ 所有照片已是最新，无需备份';
      countText.textContent = `共 ${fileArr.length} 个`;
      bar.style.width = '100%';
      backupRunning = false;
      _backupDone(0);
      return;
    }
    statusText.textContent = `发现 ${toUpload.length} 个新文件，开始上传...`;
    countText.textContent = `已备份 ${skipped} 个`;
  } catch (_) {
    statusText.textContent = `上传 ${toUpload.length} 个文件...`;
  }

  // 分批上传
  const BATCH = 5;
  let done = 0;
  for (let i = 0; i < toUpload.length; i += BATCH) {
    const batch = toUpload.slice(i, i + BATCH);
    const fd = new FormData();
    batch.forEach(f => fd.append('files', f));
    try {
      await fetch('/api/upload', { method: 'POST', body: fd });
      done += batch.length;
    } catch (_) {}
    const pct = Math.round(done / toUpload.length * 100);
    bar.style.width = pct + '%';
    statusText.textContent = `备份中 ${done} / ${toUpload.length}`;
    countText.textContent = pct + '%';
  }

  statusText.textContent = `✅ 备份完成，本次新增 ${done} 个`;
  countText.textContent = '100%';
  backupRunning = false;
  _backupDone(done);
  init();
}

function _backupDone(count) {
  const state = getBackupState();
  saveBackupState({ ...state, lastBackup: new Date().toISOString(), uploadedCount: (state.uploadedCount || 0) + count });
  // 更新状态条
  const bar = document.getElementById('backup-bar');
  const text = document.getElementById('backup-text');
  bar.classList.remove('hidden', 'active');
  bar.classList.add('done');
  const d = new Date();
  text.textContent = `上次备份：${d.toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })}`;
  // 更新面板内信息
  const info = document.getElementById('bp-last-info');
  if (info) info.textContent = `上次备份：刚刚  累计 ${getBackupState().uploadedCount || 0} 个文件`;
}

function initBackupState() {
  const state = getBackupState();
  if (state.lastBackup) {
    const bar = document.getElementById('backup-bar');
    const text = document.getElementById('backup-text');
    bar.classList.remove('hidden', 'active');
    bar.classList.add('done');
    const d = new Date(state.lastBackup);
    text.textContent = `上次备份：${d.toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })}`;
  }
}

// ══════════════════════════════════════════════
// Service Worker

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ══════════════════════════════════════════════
// 启动
// ══════════════════════════════════════════════
init();
</script>
